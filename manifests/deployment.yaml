apiVersion: apps/v1
kind: Deployment
metadata:
  name: valarmo-playground
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valarmo-playground
  template:
    metadata:
      labels:
        app: valarmo-playground
    spec:
      containers:
        - name: valarmo-playground
          image: valarmo3/playground:v2
          ports:
            - containerPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: valarmo-playground
  namespace: dev
spec:
  selector:
    app: valarmo-playground
  type: LoadBalancer
  ports:
    - port: 8888
      targetPort: 8888
